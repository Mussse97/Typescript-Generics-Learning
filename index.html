<!DOCTYPE html>
<html lang="sv">
<head>
  <meta charset="UTF-8">
  <title>Kontaktlista med Generics</title>
</head>
<script type="module" src="./src/main.ts" defer></script>
<body>
  <h1>📞 Kontaktlista</h1>

  <section>
    <h2>Lägg till kontakt</h2>
    <input id="name" type="text" placeholder="Namn">
    <input id="phone" type="text" placeholder="Telefon">
    <button id="addBtn">Lägg till</button>
  </section>

  <section>
    <h2>Sök kontakt via ID</h2>
    <input id="searchId" type="number" placeholder="ID">
    <button id="searchBtn">Sök</button>
    <p id="searchResult"></p>
  </section>

  <section>
    <h2>Alla kontakter</h2>
    <ul id="contactList"></ul>
  </section>

</body>
</html>
